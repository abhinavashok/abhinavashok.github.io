<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">
        <span class="title-icon">📓</span>
        {{ site.title }}
      </a>
      <nav class="header-nav">
        <a href="{{ '/' | relative_url }}" class="nav-link">Posts</a>
        <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
      </nav>
    </div>
  </header>

  <!-- ── Body wrapper ──────────────────────────────────── -->
  <div class="site-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <span class="toggle-icon">‹</span>
      </button>
      <div class="sidebar-content" id="sidebarContent">
        {% include sidebar.html %}
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      {{ content }}
    </main>

  </div>

  <footer class="site-footer">
    <p>© {{ site.time | date: '%Y' }} {{ site.author | default: site.title }} &nbsp;·&nbsp;
       <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank">CC BY-NC-ND 4.0</a>
    </p>
  </footer>

  <script src="{{ '/assets/js/sidebar.js' | relative_url }}"></script>
</body>
</html>
